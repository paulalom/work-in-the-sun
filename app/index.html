<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Work in the Sun</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="pin-gate" id="pinGate" hidden>
      <form class="pin-panel" id="pinForm" autocomplete="off">
        <p class="kicker">Work in the Sun</p>
        <h2>Enter Password</h2>
        <label class="sr-only" for="pinInput">Access password</label>
        <div class="pin-input-row">
          <input
            id="pinInput"
            name="password"
            type="password"
            autocomplete="current-password"
            autocapitalize="none"
            spellcheck="false"
            enterkeyhint="go"
            placeholder="Password"
          />
          <button
            class="pin-visibility-button"
            id="pinVisibilityButton"
            type="button"
            aria-label="Show password"
            aria-pressed="false"
            title="Show password"
          >
            Show
          </button>
        </div>
        <button id="pinSubmitButton" type="submit">Unlock</button>
        <details class="server-identity" id="serverIdentity">
          <summary>Server identity</summary>
          <dl>
            <div>
              <dt>Version</dt>
              <dd id="serverIdentityVersion">-</dd>
            </div>
            <div>
              <dt>Host</dt>
              <dd id="serverIdentityHost">-</dd>
            </div>
            <div>
              <dt>Fingerprint</dt>
              <dd id="serverIdentityFingerprint">-</dd>
            </div>
          </dl>
        </details>
        <p class="pin-message" id="pinMessage" aria-live="polite"></p>
      </form>
    </section>

    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="kicker">Work in the Sun</p>
          <h1>Voice Console</h1>
        </div>
        <div class="top-status">
          <div class="desktop-status" id="desktopStatus" aria-label="Desktop connection" title="Desktop connection">
            <span class="status-dot" aria-hidden="true"></span>
            <span>Desktop</span>
          </div>
          <section class="stage" id="stateStage" aria-live="polite" role="status" tabindex="0">
            <div class="pulse" id="pulse" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <p class="state-label" id="stateLabel">Ready</p>
            <p class="state-detail" id="stateDetail">Speech adapter pending</p>
          </section>
        </div>
      </header>

      <section class="target-strip" aria-live="polite">
        <span>Agent</span>
        <strong id="agentTargetLabel">Desktop agent</strong>
      </section>

      <section class="feed" aria-label="Session"></section>

      <footer class="control-dock">
        <div class="draft-panel">
          <label class="sr-only" for="draftText">Draft message</label>
          <textarea id="draftText" rows="2" placeholder="Draft message"></textarea>
        </div>

        <div class="toggle-row">
          <label class="toggle-control">
            <input type="checkbox" id="echoToggle" checked />
            <span class="switch" aria-hidden="true"></span>
            <span>Echo</span>
          </label>

          <label class="toggle-control">
            <input type="checkbox" id="autoSendToggle" />
            <span class="switch" aria-hidden="true"></span>
            <span>Auto Send</span>
          </label>

          <label class="toggle-control">
            <input type="checkbox" id="responseAudioToggle" />
            <span class="switch" aria-hidden="true"></span>
            <span>Responses</span>
          </label>

          <label class="toggle-control">
            <input type="checkbox" id="commandModeToggle" />
            <span class="switch" aria-hidden="true"></span>
            <span>Commands</span>
          </label>
        </div>

        <div class="button-row">
          <button class="command-button" id="commandButton" type="button" aria-label="Voice command">
            <span class="command-core" aria-hidden="true"></span>
          </button>

          <button class="record-button" id="recordButton" type="button" aria-label="Push to talk">
            <span class="record-core" aria-hidden="true"></span>
          </button>

          <button class="send-button" id="sendButton" type="button" disabled>Send</button>
        </div>
      </footer>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
