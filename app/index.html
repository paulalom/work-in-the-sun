<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Work in the Sun</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="kicker">Work in the Sun</p>
          <h1>Voice Console</h1>
        </div>
        <div class="desktop-status" id="desktopStatus">
          <span class="status-dot" aria-hidden="true"></span>
          <span>Desktop</span>
        </div>
      </header>

      <section class="target-strip" aria-live="polite">
        <span>Agent</span>
        <strong id="agentTargetLabel">Desktop agent</strong>
      </section>

      <section class="stage" aria-live="polite">
        <div class="pulse" id="pulse" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p class="state-label" id="stateLabel">Ready</p>
        <p class="state-detail" id="stateDetail">Speech adapter pending</p>
      </section>

      <section class="feed" aria-label="Session">
        <article class="message message-system">
          <p>Checking Local Dictate.</p>
        </article>
      </section>

      <footer class="control-dock">
        <div class="draft-panel">
          <label class="sr-only" for="draftText">Draft message</label>
          <textarea id="draftText" rows="2" placeholder="Draft message"></textarea>
        </div>

        <div class="toggle-row">
          <label class="toggle-control">
            <input type="checkbox" id="echoToggle" />
            <span class="switch" aria-hidden="true"></span>
            <span>Echo</span>
          </label>

          <label class="toggle-control">
            <input type="checkbox" id="autoSendToggle" />
            <span class="switch" aria-hidden="true"></span>
            <span>Auto Send</span>
          </label>

          <label class="toggle-control">
            <input type="checkbox" id="responseAudioToggle" />
            <span class="switch" aria-hidden="true"></span>
            <span>Responses</span>
          </label>
        </div>

        <div class="button-row">
          <button class="command-button" id="commandButton" type="button" aria-label="Voice command">
            <span class="command-core" aria-hidden="true"></span>
          </button>

          <button class="record-button" id="recordButton" type="button" aria-label="Push to talk">
            <span class="record-core" aria-hidden="true"></span>
          </button>

          <button class="send-button" id="sendButton" type="button" disabled>Send</button>
        </div>
      </footer>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
